name: Post Daily Scrum Thread

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0-4"
      timezone: "America/Chicago"

jobs:
  post-scrum:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Verify secrets exist
        run: |
          if [ -z "$DISCORD_BOT_TOKEN" ]; then echo "Missing DISCORD_BOT_TOKEN"; exit 1; fi
          if [ -z "$DISCORD_FORUM_CHANNEL_ID" ]; then echo "Missing DISCORD_FORUM_CHANNEL_ID"; exit 1; fi
          echo "Secrets look present"
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_FORUM_CHANNEL_ID: ${{ secrets.DISCORD_FORUM_CHANNEL_ID }}

      - name: Run scrum bot
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_FORUM_CHANNEL_ID: ${{ secrets.DISCORD_FORUM_CHANNEL_ID }}
          TIMEZONE: America/Chicago
        run: node index.js